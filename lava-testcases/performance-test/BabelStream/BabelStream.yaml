metadata:
    name: ltp
    format: "Lava-Test Test Definition 1.0"
    description: "Run sysbench on openEuler RISC-V"
    maintainer:
        - wujie22@iscas.ac.cn
    os:
        - openEuler-riscv64
    scope:
        - performance
    devices:
      - qemu
      - lpi4a
      - sg2042
      - spacemit-k1-bananapi-f3
run:
    steps:
        - cd lava-testcases/performance-test/BabelStream/
        - chmod +x BabelStream.sh
        - ./BabelStream.sh
        - chmod +x ../../utils/send-to-lava.sh
        - ../../utils/send-to-lava.sh ./output/result.txt  