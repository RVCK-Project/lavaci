metadata:
  name: ycsb-client
  format: "Lava-Test Test Definition 1.0"
  description: "Run fio on RISC-V device"
  maintainer:
    - wujie22@iscas.ac.cn
  os:
    - openEuler-riscv64
  scope:
      - performance
  devices:
    - qemu
    - lpi4a
    - sg2042
    - spacemit-k1-bananapi-f3
params:
  WORKLOAD: "workloads/workloada"
  RECORDCOUNT: "1000"
  THREADS: "10"
run:
  steps:
    - cd lava-testcases/performance-test/YCSB
    - bash ycsb-redis-client.sh -w "${WORKLOAD}" -c "${RECORDCOUNT}" -t "${THREADS}"
    - chmod +x ../../utils/send-to-lava.sh
    - ../../utils/send-to-lava.sh ./output/result.txt