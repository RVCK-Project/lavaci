metadata:
  name: ffmpeg
  format: "Lava-Test Test Definition 1.0"
  description: "Run fio on RISC-V device"
  maintainer:
    - wujie22@iscas.ac.cn
  os:
    - openEuler-riscv64
  scope:
      - performance
  devices:
    - qemu
    - lpi4a
    - sg2042
    - spacemit-k1-bananapi-f3
params:
  DURATION: 10
  SIZE: "1920x1080"
  RATE: 30
run:
  steps:
    - cd lava-testcases/performance-test/ffmpeg
    - bash ffmpeg.sh -d "${DURATION}" -s "${SIZE}" -r "${RATE}"
    - chmod +x ../../utils/send-to-lava.sh
    - ../../utils/send-to-lava.sh ./output/result.txt