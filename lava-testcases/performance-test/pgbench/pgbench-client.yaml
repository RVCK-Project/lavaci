metadata:
  name: pgbench-postgresql-client
  format: "Lava-Test Test Definition 1.0"
  description: "Run fio on RISC-V device"
  maintainer:
    - wujie22@iscas.ac.cn
  os:
    - openEuler-riscv64
  scope:
      - performance
  devices:
    - qemu
    - lpi4a
    - sg2042
    - spacemit-k1-bananapi-f3
params:
  CLIENT: 50
  JOBS: 4
  TIME: 60
run:
  steps:
    - cd lava-testcases/performance-test/pgbench
    - bash pgbench-client.sh -c "${CLIENT}" -j "${JOBS}" -T "${TIME}"
    - chmod +x ../../utils/send-to-lava.sh
    - ../../utils/send-to-lava.sh ./output/result.txt